name: Build Android APKs (Zashboard & MetaCubeX)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-zashboard:
    name: Build Zashboard Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Download and extract Zashboard
        run: |
          wget -q https://github.com/Zephyruso/zashboard/releases/latest/download/dist-firasans-only.zip
          unzip -q dist-firasans-only.zip
          mv dist zashboard-dist
          
          if [ ! -f "zashboard-dist/index.html" ]; then
            echo "ERROR: index.html not found!"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Initialize npm project
        run: |
          cat > package.json << 'EOF'
          {
            "name": "zashboard-android",
            "version": "1.0.0"
          }
          EOF

      - name: Install Capacitor packages
        run: npm install @capacitor/core@6.1.2 @capacitor/cli@6.1.2 @capacitor/android@6.1.2

      - name: Prepare app icon before Capacitor setup
        run: |
          # 安装 imagemagick 用于图标处理
          sudo apt-get update -qq
          sudo apt-get install -y imagemagick

          # 创建图标目录
          mkdir -p resources

          # 使用 Zashboard 的图标创建一个 1024x1024 的标准图标
          if [ -f "zashboard-dist/pwa-512x512.png" ]; then
            convert zashboard-dist/pwa-512x512.png -resize 1024x1024 resources/icon.png
          elif [ -f "zashboard-dist/pwa-192x192.png" ]; then
            convert zashboard-dist/pwa-192x192.png -resize 1024x1024 resources/icon.png
          fi

          echo "✓ App icon prepared"

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.zashboard.app",
            "appName": "Zashboard",
            "webDir": "zashboard-dist",
            "server": {
              "androidScheme": "http"
            },
            "android": {
              "allowMixedContent": true
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force replace Android icon after sync
        run: |
          echo "=== Forcing icon replacement for Zashboard ==="

          # 检查源图标是否存在
          if [ ! -f "resources/icon.png" ]; then
            echo "WARNING: Source icon not found, using default Capacitor icon"
            ls -la resources/
          else
            # 手动生成所有需要的图标尺寸
            convert resources/icon.png -resize 48x48 /tmp/icon-48.png
            convert resources/icon.png -resize 72x72 /tmp/icon-72.png
            convert resources/icon.png -resize 96x96 /tmp/icon-96.png
            convert resources/icon.png -resize 144x144 /tmp/icon-144.png
            convert resources/icon.png -resize 192x192 /tmp/icon-192.png

            # 强制替换所有 mipmap 目录中的图标
            cp /tmp/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp /tmp/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp /tmp/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp /tmp/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp /tmp/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

            # 同时替换圆形图标
            cp /tmp/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            cp /tmp/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            cp /tmp/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            cp /tmp/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            cp /tmp/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

            # 处理adaptive图标 (Android 8.0+)
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26

            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
              '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
              '    <background android:drawable="@color/ic_launcher_background"/>' \
              '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' \
              '</adaptive-icon>' \
              > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
              '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
              '    <background android:drawable="@color/ic_launcher_background"/>' \
              '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' \
              '</adaptive-icon>' \
              > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

            # 创建背景颜色资源
            mkdir -p android/app/src/main/res/values
            # 删除 Capacitor 自动生成的 ic_launcher_background.xml 以避免资源冲突
            rm -f android/app/src/main/res/values/ic_launcher_background.xml
            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
              '<resources>' \
              '    <color name="ic_launcher_background">#FFFFFF</color>' \
              '</resources>' \
              > android/app/src/main/res/values/colors.xml

            # 创建前景图标（使用最大的图标作为前景）
            mkdir -p android/app/src/main/res/mipmap
            cp /tmp/icon-192.png android/app/src/main/res/mipmap/ic_launcher_foreground.png
          fi

          echo "✓ Zashboard icons forcefully replaced"
          ls -lh android/app/src/main/res/mipmap-*/ic_launcher.png

      - name: Update version numbers
        run: |
          # 获取上游 Zashboard 的版本号
          UPSTREAM_VERSION=$(curl -s https://raw.githubusercontent.com/Zephyruso/zashboard/main/package.json | grep -oP '"version":\s*"\K[^"]+')

          # 将版本号转换为 versionCode (例如: 2.0.0 -> 200000)
          MAJOR=$(echo $UPSTREAM_VERSION | cut -d. -f1)
          MINOR=$(echo $UPSTREAM_VERSION | cut -d. -f2)
          PATCH=$(echo $UPSTREAM_VERSION | cut -d. -f3)
          BASE_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          # versionCode = 基础版本号 + 构建编号 (确保每次构建都是唯一的)
          VERSION_CODE=$((BASE_CODE * 1000 + ${{ github.run_number }}))
          VERSION_NAME="$UPSTREAM_VERSION-build${{ github.run_number }}"

          # 更新 build.gradle 中的版本号
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle

          echo "✓ Upstream version: $UPSTREAM_VERSION"
          echo "✓ Version updated to versionCode=$VERSION_CODE, versionName=$VERSION_NAME"

      - name: Configure Android for HTTP support
        run: |
          sed -i 's/<application/<application\n        android:usesCleartextTraffic="true"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Decode signing key from secrets
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/zashboard-release.keystore
          echo "✓ Signing key decoded from secure secrets"

      - name: Configure Gradle signing for Release
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('zashboard-release.keystore')
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.KEY_ALIAS }}"
                      keyPassword "${{ secrets.KEY_PASSWORD }}"
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.release
                  }
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          EOF
          echo "✓ Gradle signing configured for Release build"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 改为构建Release APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon
        timeout-minutes: 15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zashboard-android-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-metacubex:
    name: Build MetaCubeX Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Download and extract MetaCubeX
